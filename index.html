<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="author" content="Abdelwahab Abdelsalam" />
  <title>Weather App</title>
  <link rel="stylesheet" href="./css/bootstrap.min.css" />
  <link rel="stylesheet" href="./css/style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"/>
</head>
<body class="bg-dark text-light">
  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm py-3">
    <div class="container px-5">
      <a class="navbar-brand d-flex align-items-center" href="#">
        <img src="imgs/logo@2x.png" alt="Logo" width="64" height="38" class="me-2" />
        <span class="fw-bold fs-4 text-info">Weather</span>
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
        <ul class="navbar-nav w-50 d-flex justify-content-around">
          <li class="nav-item"><a class="nav-link nav-link-custom active" href="#">Home</a></li>
          <li class="nav-item"><a class="nav-link nav-link-custom" href="#">News</a></li>
          <li class="nav-item"><a class="nav-link nav-link-custom" href="#">Live Cameras</a></li>
          <li class="nav-item"><a class="nav-link nav-link-custom" href="#">Photos</a></li>
          <li class="nav-item"><a class="nav-link nav-link-custom" href="#">Contact</a></li>
        </ul>
      </div>
    </div>
  </nav>
  <section class="vh-80 bg-dark position-relative overflow-hidden">
    <div class="bg-image-half"></div>
    <div class="position-absolute start-50 translate-middle-x w-75 z-2" style="top: 15%;">
      <div class="input-group shadow-lg">
        <input type="text" class="form-control custom-input" id="searchInput" placeholder="Search for location..." aria-label="Search" aria-describedby="button-addon2">
        <button class="btn " style="background-color: #009ad8;" type="button" >Find</button>
      </div>
    </div>
    <!-- Weather Cards -->
    <div class="container py-5 position-relative z-2" style="margin-top: 150px;">
      <div class="row g-4">
        <div class="col-4 today">
          <div class="weather-card ">           
            <div class="d-flex justify-content-between">
              <div class="small-text day">Friday</div>

              <div class="d-flex"> <div class="small-text mx-1 date">2</div>
              <div class="month small-text">May</div></div>
             
            </div>            
            <h3 id="city-name">cairo</h3>
            <h2 class="temp-main">27.4℃</h2>
           <img class="weather-icon" src="http://cdn.weatherapi.com/weather/64x64/night/113.png" alt="">
            <div class="text-info status">Partly cloudy</div>
            <div class="mt-3 small-text">
              ☔ <samp class="humidity" >20%</samp> &nbsp;&nbsp; 💨 <samp class="wind">18km/h</samp> &nbsp;&nbsp; ➡️ <samp class="wind-dir">East</samp> 
            </div>
          </div>
        </div>
        <div class="col-4 tomorrow">
          <div class="weather-card">
            <div class="small-text tomorrow-day">Saturday</div>
            <h2 class="temp-main max-t">26.1℃</h2>
            <div class="small-text min-t">16.9℃</div>
            <img class="weather-icon2" src="http://cdn.weatherapi.com/weather/64x64/night/113.png" alt="">
            <div class="status2 text-info">Sunny</div>
          </div>
        </div>
        <div class="col-4 aftertomorrow">
          <div class="weather-card">
            <div class="small-text aftertomorrow-day">Saturday</div>
            <h2 class="temp-main max-t">26.1℃</h2>
            <div class="small-text min-t">16.9℃</div>
            <img class="weather-icon2" src="http://cdn.weatherapi.com/weather/64x64/night/113.png" alt="">
            <div class="status2 text-info">Sunny</div>
          </div>
        </div>
      </div>
    </div>
  </section>
  <!-- Footer -->
<footer class="footer-custom d-flex justify-content-around align-items-center px-5">
    <div class="w-50">
      <div class="input-group shadow-lg w-100">
        <input type="text" class="form-control custom-input" placeholder="Enter your email to subscribe..." aria-label="Search" aria-describedby="button-addon2">
        <button class="btn " style="background-color: #009ad8;" type="button" id="button-addon2">Subscribe</button>
      </div>
    </div>
    <!-- Social icons -->
    <div class="social-icons d-flex gap-2">
      <div class="icon-wrapper">
        <i class="fab fa-facebook-f"></i>
      </div>
      <div class="icon-wrapper">
        <i class="fab fa-twitter"></i>
      </div>
      <div class="icon-wrapper">
        <i class="fab fa-google-plus-g"></i>
      </div>
      <div class="icon-wrapper">
        <i class="fab fa-pinterest-p"></i>
      </div>
    </div>
  </footer>
  <script src="./js/bootstrap.bundle.min.js"></script>
  <script src="./js/script.js"></script>
</body>
</html>
